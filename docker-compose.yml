services:
  postgres:
    image: postgres:14
    container_name: postgres_container
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sithumw
      POSTGRES_PASSWORD: sithumw
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sithumw"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_container
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: pgadmin4@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin:/var/lib/pgadmin


  #Adding RabbitMQ
  rabbitmq:
    container_name: rabbitmq_container
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672" #RabbitMQ Message Broker
      - "15672:15672" #RabbitMQ Management UI (http://localhost:15672)
    networks:
      - backend
    restart: unless-stopped




networks:
  backend: #Change postgres -> backend (because we are running rabbitMQ too)
    driver: bridge

volumes:
  postgres:
  pgadmin:
